<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>贪吃蛇 - Snake</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  html, body {
    height: 100%;
    overflow: hidden;
    font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
    background: #0f0f23;
    color: #e5e7eb;
    user-select: none;
    -webkit-user-select: none;
  }

  #app {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    width: 100%;
    padding: 12px;
    gap: 12px;
  }

  .hud {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    max-width: 480px;
    gap: 12px;
  }

  .score-box {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 12px;
    padding: 8px 14px;
    min-width: 96px;
    backdrop-filter: blur(6px);
  }

  .score-label {
    font-size: 11px;
    letter-spacing: 2px;
    color: #9ca3af;
    text-transform: uppercase;
  }

  .score-value {
    font-size: 22px;
    font-weight: 700;
    color: #22c55e;
    line-height: 1.1;
    font-variant-numeric: tabular-nums;
  }

  .score-box.best .score-value {
    color: #fbbf24;
  }

  .title {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 3px;
    color: #cbd5e1;
    text-align: center;
    flex: 1;
  }

  .restart-btn {
    background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
    color: #052e16;
    border: none;
    border-radius: 12px;
    padding: 10px 16px;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.12s ease;
    box-shadow: 0 4px 14px rgba(34, 197, 94, 0.35);
    font-family: inherit;
    white-space: nowrap;
  }

  .restart-btn:hover {
    filter: brightness(1.08);
    box-shadow: 0 6px 18px rgba(34, 197, 94, 0.5);
  }

  .restart-btn:active {
    transform: scale(0.96);
  }

  .stage {
    position: relative;
    width: 100%;
    max-width: 480px;
    aspect-ratio: 1 / 1;
    border-radius: 16px;
    overflow: hidden;
    background: #0f0f23;
    border: 1px solid rgba(255, 255, 255, 0.06);
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), inset 0 0 60px rgba(34, 197, 94, 0.04);
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
    touch-action: none;
  }

  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    background: rgba(15, 15, 35, 0.82);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
    z-index: 5;
  }

  .overlay.show {
    opacity: 1;
    pointer-events: auto;
  }

  .overlay h2 {
    font-size: 30px;
    font-weight: 800;
    letter-spacing: 4px;
    color: #ef4444;
    text-shadow: 0 0 24px rgba(239, 68, 68, 0.6);
  }

  .overlay .final-score {
    font-size: 16px;
    color: #cbd5e1;
    letter-spacing: 1px;
  }

  .overlay .final-score b {
    color: #22c55e;
    font-size: 22px;
    margin-left: 6px;
  }

  .overlay .hint {
    font-size: 12px;
    color: #6b7280;
    letter-spacing: 1px;
  }

  .overlay button {
    margin-top: 6px;
    background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
    color: #052e16;
    border: none;
    border-radius: 12px;
    padding: 12px 28px;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(34, 197, 94, 0.45);
    transition: transform 0.12s ease, filter 0.12s ease;
    font-family: inherit;
  }

  .overlay button:hover { filter: brightness(1.08); }
  .overlay button:active { transform: scale(0.96); }

  .start-screen h2 {
    color: #22c55e;
    text-shadow: 0 0 24px rgba(34, 197, 94, 0.6);
  }

  .footer-hint {
    font-size: 11px;
    color: #4b5563;
    letter-spacing: 1px;
    text-align: center;
    line-height: 1.6;
  }

  .footer-hint kbd {
    display: inline-block;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 10px;
    font-family: inherit;
    color: #9ca3af;
    margin: 0 1px;
  }

  @media (max-width: 380px) {
    .score-value { font-size: 18px; }
    .title { font-size: 13px; letter-spacing: 2px; }
    .restart-btn { padding: 9px 12px; font-size: 12px; }
    .overlay h2 { font-size: 24px; }
  }
</style>
</head>
<body>
  <div id="app">
    <div class="hud">
      <div class="score-box">
        <span class="score-label">分数</span>
        <span class="score-value" id="score">0</span>
      </div>
      <div class="title">贪 吃 蛇</div>
      <div class="score-box best">
        <span class="score-label">最高</span>
        <span class="score-value" id="best">0</span>
      </div>
    </div>

    <div class="stage" id="stage">
      <canvas id="game"></canvas>
      <div class="overlay start-screen show" id="overlay">
        <h2 id="overlayTitle">贪吃蛇</h2>
        <div class="final-score" id="overlaySub">准备好了吗？</div>
        <button id="overlayBtn">开始游戏</button>
        <div class="hint">方向键 / WASD / 滑动屏幕</div>
      </div>
    </div>

    <div class="footer-hint">
      <kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd> 或 <kbd>WASD</kbd> 移动 · <kbd>空格</kbd> 暂停 · <button id="restartBtn" class="restart-btn">重新开始</button>
    </div>
  </div>

<script>
(function () {
  "use strict";

  // ---------- 配置 ----------
  var GRID = 20;                 // 网格数量 (20x20)
  var BASE_SPEED = 220;          // 初始移动间隔(ms)
  var MIN_SPEED = 100;           // 最快移动间隔
  var SPEED_STEP = 5;            // 每吃一个食物加速量
  var COLORS = {
    bg: "#0f0f23",
    grid: "rgba(255,255,255,0.025)",
    snake: "#22c55e",
    snakeHead: "#4ade80",
    food: "#ef4444",
    foodGlow: "rgba(239,68,68,0.35)"
  };

  // ---------- 元素 ----------
  var canvas = document.getElementById("game");
  var ctx = canvas.getContext("2d");
  var stage = document.getElementById("stage");
  var scoreEl = document.getElementById("score");
  var bestEl = document.getElementById("best");
  var overlay = document.getElementById("overlay");
  var overlayTitle = document.getElementById("overlayTitle");
  var overlaySub = document.getElementById("overlaySub");
  var overlayBtn = document.getElementById("overlayBtn");
  var restartBtn = document.getElementById("restartBtn");

  // ---------- 状态 ----------
  var cell = 0;                  // 单元格像素大小
  var snake = [];
  var dir = { x: 1, y: 0 };
  var nextDir = { x: 1, y: 0 };
  var food = { x: 10, y: 10 };
  var score = 0;
  var best = 0;
  var speed = BASE_SPEED;
  var running = false;
  var paused = false;
  var gameOver = false;
  var lastTick = 0;
  var rafId = null;
  var foodPulse = 0;

  // 读取最高分
  try {
    var saved = window.localStorage.getItem("snake_best");
    if (saved) best = parseInt(saved, 10) || 0;
  } catch (e) {}
  bestEl.textContent = best;

  // ---------- 画布尺寸 ----------
  function resize() {
    var rect = stage.getBoundingClientRect();
    var size = Math.floor(Math.min(rect.width, rect.height));
    // 使用设备像素比保证清晰度
    var dpr = window.devicePixelRatio || 1;
    canvas.width = size * dpr;
    canvas.height = size * dpr;
    canvas.style.width = size + "px";
    canvas.style.height = size + "px";
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    cell = size / GRID;
    draw();
  }
  window.addEventListener("resize", resize);

  // ---------- 游戏逻辑 ----------
  function reset() {
    snake = [
      { x: 8, y: 10 },
      { x: 7, y: 10 },
      { x: 6, y: 10 }
    ];
    dir = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    score = 0;
    speed = BASE_SPEED;
    paused = false;
    gameOver = false;
    scoreEl.textContent = "0";
    placeFood();
    draw();
  }

  function placeFood() {
    var tries = 0;
    while (tries < 500) {
      var fx = Math.floor(Math.random() * GRID);
      var fy = Math.floor(Math.random() * GRID);
      var hit = false;
      for (var i = 0; i < snake.length; i++) {
        if (snake[i].x === fx && snake[i].y === fy) { hit = true; break; }
      }
      if (!hit) { food = { x: fx, y: fy }; return; }
      tries++;
    }
    food = { x: 0, y: 0 };
  }

  function startGame() {
    reset();
    running = true;
    hideOverlay();
    lastTick = performance.now();
    if (rafId) cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(loop);
  }

  function endGame() {
    running = false;
    gameOver = true;
    if (score > best) {
      best = score;
      bestEl.textContent = best;
      try { window.localStorage.setItem("snake_best", String(best)); } catch (e) {}
    }
    showOverlay("游戏结束", "本局分数", "重新开始");
  }

  function showOverlay(title, sub, btn) {
    overlayTitle.textContent = title;
    overlaySub.innerHTML = sub === "本局分数"
      ? '本局分数 <b>' + score + '</b>'
      : sub;
    overlayBtn.textContent = btn;
    overlay.classList.add("show");
    overlay.classList.remove("start-screen");
    if (!running && !gameOver) overlay.classList.add("start-screen");
  }

  function hideOverlay() {
    overlay.classList.remove("show");
  }

  function step() {
    dir = nextDir;
    var head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    // 撞墙
    if (head.x < 0 || head.y < 0 || head.x >= GRID || head.y >= GRID) {
      endGame();
      return;
    }
    // 撞自身
    for (var i = 0; i < snake.length; i++) {
      if (snake[i].x === head.x && snake[i].y === head.y) {
        endGame();
        return;
      }
    }

    snake.unshift(head);

    // 吃食物
    if (head.x === food.x && head.y === food.y) {
      score += 10;
      scoreEl.textContent = score;
      // 加速
      speed = Math.max(MIN_SPEED, BASE_SPEED - Math.floor(score / 10) * SPEED_STEP);
      placeFood();
    } else {
      snake.pop();
    }
  }

  // ---------- 主循环 ----------
  function loop(now) {
    if (!running) return;
    if (!paused) {
      var elapsed = now - lastTick;
      if (elapsed >= speed) {
        lastTick = now - (elapsed % speed);
        step();
      }
    }
    foodPulse += 0.08;
    draw();
    rafId = requestAnimationFrame(loop);
  }

  // ---------- 渲染 ----------
  function draw() {
    var size = canvas.width / (window.devicePixelRatio || 1);
    // 背景
    ctx.fillStyle = COLORS.bg;
    ctx.fillRect(0, 0, size, size);

    // 网格
    ctx.strokeStyle = COLORS.grid;
    ctx.lineWidth = 1;
    for (var i = 1; i < GRID; i++) {
      ctx.beginPath();
      ctx.moveTo(i * cell, 0);
      ctx.lineTo(i * cell, size);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0, i * cell);
      ctx.lineTo(size, i * cell);
      ctx.stroke();
    }

    // 食物 (带脉冲光晕)
    var pulse = (Math.sin(foodPulse) + 1) / 2; // 0~1
    var fx = food.x * cell + cell / 2;
    var fy = food.y * cell + cell / 2;
    var glowR = cell * (0.55 + pulse * 0.25);
    var grad = ctx.createRadialGradient(fx, fy, 0, fx, fy, glowR);
    grad.addColorStop(0, COLORS.foodGlow);
    grad.addColorStop(1, "rgba(239,68,68,0)");
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(fx, fy, glowR, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = COLORS.food;
    ctx.beginPath();
    ctx.arc(fx, fy, cell * 0.32, 0, Math.PI * 2);
    ctx.fill();
    // 高光
    ctx.fillStyle = "rgba(255,255,255,0.4)";
    ctx.beginPath();
    ctx.arc(fx - cell * 0.1, fy - cell * 0.1, cell * 0.1, 0, Math.PI * 2);
    ctx.fill();

    // 蛇身
    for (var s = snake.length - 1; s >= 0; s--) {
      var seg = snake[s];
      var isHead = (s === 0);
      var pad = cell * 0.08;
      var r = cell * 0.22;
      var x = seg.x * cell + pad;
      var y = seg.y * cell + pad;
      var w = cell - pad * 2;
      var h = cell - pad * 2;

      if (isHead) {
        ctx.fillStyle = COLORS.snakeHead;
        ctx.shadowColor = "rgba(34,197,94,0.5)";
        ctx.shadowBlur = cell * 0.4;
      } else {
        // 尾部稍暗
        var t = s / snake.length;
        ctx.fillStyle = shadeColor(COLORS.snake, -t * 18);
        ctx.shadowBlur = 0;
      }
      roundRect(ctx, x, y, w, h, r);
      ctx.fill();
      ctx.shadowBlur = 0;

      // 蛇头眼睛
      if (isHead) {
        drawEyes(seg, dir);
      }
    }

    // 暂停提示
    if (paused && running) {
      ctx.fillStyle = "rgba(15,15,35,0.6)";
      ctx.fillRect(0, 0, size, size);
      ctx.fillStyle = "#e5e7eb";
      ctx.font = "bold " + (cell * 0.9) + "px sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText("已暂停", size / 2, size / 2);
    }
  }

  function drawEyes(head, d) {
    var cx = head.x * cell + cell / 2;
    var cy = head.y * cell + cell / 2;
    var off = cell * 0.18;
    var perp = { x: -d.y, y: d.x };
    var eye1 = { x: cx + d.x * off * 0.4 + perp.x * off, y: cy + d.y * off * 0.4 + perp.y * off };
    var eye2 = { x: cx + d.x * off * 0.4 - perp.x * off, y: cy + d.y * off * 0.4 - perp.y * off };
    var r = cell * 0.075;
    ctx.fillStyle = "#052e16";
    ctx.beginPath(); ctx.arc(eye1.x, eye1.y, r, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(eye2.x, eye2.y, r, 0, Math.PI * 2); ctx.fill();
  }

  function roundRect(ctx, x, y, w, h, r) {
    if (w < 2 * r) r = w / 2;
    if (h < 2 * r) r = h / 2;
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function shadeColor(hex, percent) {
    var num = parseInt(hex.slice(1), 16);
    var amt = Math.round(2.55 * percent);
    var R = (num >> 16) + amt;
    var G = ((num >> 8) & 0x00ff) + amt;
    var B = (num & 0x0000ff) + amt;
    R = Math.max(0, Math.min(255, R));
    G = Math.max(0, Math.min(255, G));
    B = Math.max(0, Math.min(255, B));
    return "#" + (0x1000000 + R * 0x10000 + G * 0x100 + B).toString(16).slice(1);
  }

  // ---------- 输入：方向 ----------
  function setDirection(nx, ny) {
    // 阻止 180 度反向
    if (nx === -dir.x && ny === -dir.y) return;
    // 同一方向重复不更新(避免连续按键打断)
    if (nx === dir.x && ny === dir.y) return;
    nextDir = { x: nx, y: ny };
  }

  function handleKey(e) {
    var key = e.key;
    if (key === " " || key === "Spacebar") {
      e.preventDefault();
      if (running && !gameOver) {
        paused = !paused;
        if (!paused) lastTick = performance.now();
      }
      return;
    }
    if (!running || paused || gameOver) return;
    switch (key) {
      case "ArrowUp": case "w": case "W": setDirection(0, -1); e.preventDefault(); break;
      case "ArrowDown": case "s": case "S": setDirection(0, 1); e.preventDefault(); break;
      case "ArrowLeft": case "a": case "A": setDirection(-1, 0); e.preventDefault(); break;
      case "ArrowRight": case "d": case "D": setDirection(1, 0); e.preventDefault(); break;
    }
  }
  window.addEventListener("keydown", handleKey);

  // ---------- 输入：触摸滑动 ----------
  var touchStart = null;
  var SWIPE_MIN = 18;

  stage.addEventListener("touchstart", function (e) {
    if (e.touches.length === 1) {
      touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    }
  }, { passive: true });

  stage.addEventListener("touchmove", function (e) {
    if (!touchStart) return;
    var dx = e.touches[0].clientX - touchStart.x;
    var dy = e.touches[0].clientY - touchStart.y;
    if (Math.abs(dx) < SWIPE_MIN && Math.abs(dy) < SWIPE_MIN) return;
    if (Math.abs(dx) > Math.abs(dy)) {
      setDirection(dx > 0 ? 1 : -1, 0);
    } else {
      setDirection(0, dy > 0 ? 1 : -1);
    }
    touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    e.preventDefault();
  }, { passive: false });

  stage.addEventListener("touchend", function () {
    touchStart = null;
  }, { passive: true });

  // ---------- 按钮 ----------
  overlayBtn.addEventListener("click", function () {
    startGame();
  });

  restartBtn.addEventListener("click", function () {
    startGame();
  });

  // ---------- 启动 ----------
  resize();
  // 初始展示一条静态蛇
  snake = [
    { x: 8, y: 10 },
    { x: 7, y: 10 },
    { x: 6, y: 10 }
  ];
  food = { x: 14, y: 10 };
  draw();

  // 延迟一帧确保布局完成
  setTimeout(resize, 50);
})();
</script>
</body>
</html>
