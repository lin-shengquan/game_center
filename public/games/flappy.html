<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>飞扬的小鸟 - Flappy Bird</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif; background: #71c5cf; color: #333; user-select: none; }
  #game-container { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  canvas { background: #71c5cf; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
  .ui-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
  .ui-overlay.active { pointer-events: auto; }
  .score { font-size: 48px; font-weight: bold; color: #fff; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); margin-bottom: 20px; }
  .message { font-size: 24px; color: #fff; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); margin-bottom: 20px; }
  .btn { padding: 12px 32px; font-size: 18px; font-weight: bold; background: #ff6b6b; color: #fff; border: none; border-radius: 25px; cursor: pointer; box-shadow: 0 4px 10px rgba(255,107,107,0.4); transition: transform 0.1s; pointer-events: auto; }
  .btn:active { transform: scale(0.95); }
</style>
</head>
<body>
<div id="game-container">
  <canvas id="gameCanvas"></canvas>
  <div class="ui-overlay" id="startOverlay">
    <div class="message">点击开始游戏</div>
    <button class="btn" id="startBtn">开始</button>
  </div>
  <div class="ui-overlay" id="gameOverOverlay" style="display:none;">
    <div class="score" id="finalScore">0</div>
    <div class="message">游戏结束</div>
    <button class="btn" id="restartBtn">重新开始</button>
  </div>
</div>

<script>
(function() {
  var canvas = document.getElementById('gameCanvas');
  var ctx = canvas.getContext('2d');
  
  var CANVAS_WIDTH = 320;
  var CANVAS_HEIGHT = 480;
  
  canvas.width = CANVAS_WIDTH;
  canvas.height = CANVAS_HEIGHT;
  
  var BIRD_WIDTH = 30;
  var BIRD_HEIGHT = 25;
  var GRAVITY = 0.2;
  var JUMP_FORCE = -5.5;
  var PIPE_WIDTH = 50;
  var PIPE_GAP = 130;
  var PIPE_SPEED = 1.8;
  
  var bird = { x: 80, y: CANVAS_HEIGHT/2, vy: 0, rotation: 0 };
  var pipes = [];
  var score = 0;
  var isPlaying = false;
  var animationId = null;
  var pipeTimer = 0;
  var PIPE_SPAWN_INTERVAL = 1500;
  
  var startOverlay = document.getElementById('startOverlay');
  var gameOverOverlay = document.getElementById('gameOverOverlay');
  var finalScoreEl = document.getElementById('finalScore');
  var startBtn = document.getElementById('startBtn');
  var restartBtn = document.getElementById('restartBtn');
  
  function drawBird() {
    ctx.save();
    ctx.translate(bird.x, bird.y);
    ctx.rotate(bird.rotation);
    
    ctx.fillStyle = '#ffd700';
    ctx.beginPath();
    ctx.ellipse(0, 0, BIRD_WIDTH/2, BIRD_HEIGHT/2, 0, 0, Math.PI*2);
    ctx.fill();
    
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(5, -5, 5, 0, Math.PI*2);
    ctx.fill();
    
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(7, -5, 2, 0, Math.PI*2);
    ctx.fill();
    
    ctx.fillStyle = '#ff6b6b';
    ctx.beginPath();
    ctx.moveTo(10, 0);
    ctx.lineTo(20, 0);
    ctx.lineTo(15, 5);
    ctx.closePath();
    ctx.fill();
    
    ctx.fillStyle = '#ff8c00';
    ctx.beginPath();
    ctx.ellipse(-5, 0, 8, 5, -0.5, 0, Math.PI*2);
    ctx.fill();
    
    ctx.restore();
  }
  
  function drawPipes() {
    for (var i = 0; i < pipes.length; i++) {
      var pipe = pipes[i];
      
      ctx.fillStyle = '#2e8b57';
      ctx.fillRect(pipe.x, 0, PIPE_WIDTH, pipe.topHeight);
      ctx.fillRect(pipe.x, pipe.topHeight + PIPE_GAP, PIPE_WIDTH, CANVAS_HEIGHT - pipe.topHeight - PIPE_GAP);
      
      ctx.fillStyle = '#3cb371';
      ctx.fillRect(pipe.x - 5, pipe.topHeight - 20, PIPE_WIDTH + 10, 20);
      ctx.fillRect(pipe.x - 5, pipe.topHeight + PIPE_GAP, PIPE_WIDTH + 10, 20);
    }
  }
  
  function drawBackground() {
    ctx.fillStyle = '#71c5cf';
    ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
    
    ctx.fillStyle = '#5eb8bc';
    for (var i = 0; i < 5; i++) {
      ctx.beginPath();
      ctx.arc(i * 70 + 30, 100 + (i % 2) * 30, 40, Math.PI, 0);
      ctx.fill();
    }
    
    ctx.fillStyle = '#98d8c8';
    ctx.fillRect(0, CANVAS_HEIGHT - 50, CANVAS_WIDTH, 50);
    
    ctx.fillStyle = '#7cb69d';
    for (var j = 0; j < CANVAS_WIDTH; j += 20) {
      ctx.beginPath();
      ctx.moveTo(j, CANVAS_HEIGHT - 50);
      ctx.lineTo(j + 10, CANVAS_HEIGHT - 60);
      ctx.lineTo(j + 20, CANVAS_HEIGHT - 50);
      ctx.fill();
    }
  }
  
  function drawScore() {
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 32px Arial';
    ctx.textAlign = 'center';
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.shadowBlur = 4;
    ctx.fillText(score, CANVAS_WIDTH/2, 50);
    ctx.shadowBlur = 0;
  }
  
  function spawnPipe() {
    var minHeight = 80;
    var maxHeight = CANVAS_HEIGHT - 50 - PIPE_GAP - minHeight;
    var topHeight = minHeight + Math.random() * maxHeight;
    
    pipes.push({
      x: CANVAS_WIDTH + 50,
      topHeight: topHeight,
      passed: false
    });
  }
  
  function updatePipes() {
    for (var i = pipes.length - 1; i >= 0; i--) {
      pipes[i].x -= PIPE_SPEED;
      
      if (pipes[i].x + PIPE_WIDTH < 0) {
        pipes.splice(i, 1);
      } else if (!pipes[i].passed && pipes[i].x + PIPE_WIDTH < bird.x) {
        pipes[i].passed = true;
        score++;
      }
    }
  }
  
  function checkCollision() {
    if (bird.y + BIRD_HEIGHT/2 >= CANVAS_HEIGHT - 50 || bird.y - BIRD_HEIGHT/2 <= 0) {
      return true;
    }
    
    for (var i = 0; i < pipes.length; i++) {
      var pipe = pipes[i];
      
      if (bird.x + BIRD_WIDTH/2 > pipe.x && bird.x - BIRD_WIDTH/2 < pipe.x + PIPE_WIDTH) {
        if (bird.y - BIRD_HEIGHT/2 < pipe.topHeight || bird.y + BIRD_HEIGHT/2 > pipe.topHeight + PIPE_GAP) {
          return true;
        }
      }
    }
    
    return false;
  }
  
  function update() {
    if (!isPlaying) return;
    
    bird.vy += GRAVITY;
    bird.y += bird.vy;
    bird.rotation = Math.min(Math.PI/2, bird.vy * 0.08);
    
    pipeTimer += 16;
    if (pipeTimer >= PIPE_SPAWN_INTERVAL) {
      spawnPipe();
      pipeTimer = 0;
    }
    
    updatePipes();
    
    if (checkCollision()) {
      gameOver();
    }
  }
  
  function render() {
    drawBackground();
    drawPipes();
    drawBird();
    drawScore();
  }
  
  function gameLoop() {
    update();
    render();
    animationId = requestAnimationFrame(gameLoop);
  }
  
  function startGame() {
    bird = { x: 80, y: CANVAS_HEIGHT/2, vy: 0, rotation: 0 };
    pipes = [];
    score = 0;
    pipeTimer = 0;
    isPlaying = true;
    
    startOverlay.style.display = 'none';
    gameOverOverlay.style.display = 'none';
    
    if (animationId) {
      cancelAnimationFrame(animationId);
    }
    gameLoop();
  }
  
  function gameOver() {
    isPlaying = false;
    finalScoreEl.textContent = score;
    gameOverOverlay.style.display = 'flex';
  }
  
  function jump() {
    if (isPlaying) {
      bird.vy = JUMP_FORCE;
      bird.rotation = -0.5;
    }
  }
  
  startBtn.addEventListener('click', startGame);
  restartBtn.addEventListener('click', startGame);
  
  canvas.addEventListener('click', function() {
    if (!isPlaying && startOverlay.style.display !== 'none') {
      startGame();
    } else if (isPlaying) {
      jump();
    }
  });
  
  canvas.addEventListener('touchstart', function(e) {
    e.preventDefault();
    if (!isPlaying && startOverlay.style.display !== 'none') {
      startGame();
    } else if (isPlaying) {
      jump();
    }
  }, { passive: false });
  
  document.addEventListener('keydown', function(e) {
    if (e.code === 'Space' || e.key === ' ') {
      e.preventDefault();
      if (!isPlaying && startOverlay.style.display !== 'none') {
        startGame();
      } else if (isPlaying) {
        jump();
      } else if (gameOverOverlay.style.display === 'flex') {
        startGame();
      }
    }
  });
  
  render();
})();
</script>
</body>
</html>
