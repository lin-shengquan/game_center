<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>消消乐 - Match 3</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: #fff; user-select: none; }
  #game-container { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .ui-bar { margin-bottom: 15px; display: flex; gap: 30px; align-items: center; }
  .score-box, .level-box, .moves-box { text-align: center; }
  .score-box .label, .level-box .label, .moves-box .label { font-size: 14px; color: #888; }
  .score-box .value, .level-box .value, .moves-box .value { font-size: 28px; font-weight: bold; color: #4ade80; }
  #game-board { display: grid; grid-template-columns: repeat(8, 1fr); gap: 3px; background: #2a2a4a; padding: 10px; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
  .cell { width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 8px; background: #3a3a5a; transition: all 0.2s; }
  .cell.selected { background: rgba(59, 130, 246, 0.5); box-shadow: inset 0 0 15px rgba(59, 130, 246, 0.8); }
  .cell.matching { animation: matchAnim 0.3s ease-out forwards; }
  .cell.falling { animation: fallAnim 0.3s ease-out; }
  @keyframes matchAnim { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.2); } 100% { transform: scale(0); opacity: 0; } }
  @keyframes fallAnim { 0% { transform: translateY(-50px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
  .gem { width: 42px; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 28px; box-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
  .gem.red { background: linear-gradient(135deg, #ff6b6b, #ee5a5a); }
  .gem.blue { background: linear-gradient(135deg, #60a5fa, #4299e1); }
  .gem.green { background: linear-gradient(135deg, #4ade80, #34d399); }
  .gem.yellow { background: linear-gradient(135deg, #fbbf24, #f59e0b); }
  .gem.purple { background: linear-gradient(135deg, #c084fc, #a855f7); }
  .gem.orange { background: linear-gradient(135deg, #fb923c, #f97316); }
  .btn { padding: 10px 25px; font-size: 16px; font-weight: bold; background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%); color: #fff; border: none; border-radius: 20px; cursor: pointer; transition: all 0.2s; margin-top: 15px; }
  .btn:hover { transform: translateY(-2px); }
  .btn:active { transform: scale(0.95); }
  .game-over { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.95); padding: 40px; border-radius: 20px; text-align: center; display: none; z-index: 100; border: 2px solid #6366f1; }
  .game-over h2 { color: #4ade80; margin-bottom: 10px; font-size: 32px; }
  .game-over .final-score { font-size: 56px; font-weight: bold; background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; }
</style>
</head>
<body>
<div id="game-container">
  <div class="ui-bar">
    <div class="level-box">
      <div class="label">关卡</div>
      <div class="value" id="level">1</div>
    </div>
    <div class="moves-box">
      <div class="label">剩余步数</div>
      <div class="value" id="moves">30</div>
    </div>
    <div class="score-box">
      <div class="label">得分</div>
      <div class="value" id="score">0</div>
    </div>
    <button class="btn" id="newGameBtn">新游戏</button>
  </div>
  <div id="game-board"></div>
</div>

<div class="game-over" id="gameOver">
  <h2 id="winText">🎉 恭喜过关！</h2>
  <div class="final-score" id="finalScore">0</div>
  <button class="btn" id="restartBtn">再来一局</button>
</div>

<script>
(function() {
  var boardEl = document.getElementById('game-board');
  var levelEl = document.getElementById('level');
  var movesEl = document.getElementById('moves');
  var scoreEl = document.getElementById('score');
  var newGameBtn = document.getElementById('newGameBtn');
  var gameOverEl = document.getElementById('gameOver');
  var winText = document.getElementById('winText');
  var finalScoreEl = document.getElementById('finalScore');
  var restartBtn = document.getElementById('restartBtn');
  
  var ROWS = 8;
  var COLS = 8;
  var GEM_TYPES = ['💎', '🔵', '💚', '⭐', '💜', '🧡'];
  var GEM_COLORS = ['red', 'blue', 'green', 'yellow', 'purple', 'orange'];
  
  var board = [];
  var selectedCell = null;
  var score = 0;
  var moves = 30;
  var level = 1;
  var isProcessing = false;
  
  function initGame(lvl) {
    level = lvl || 1;
    score = 0;
    moves = 30 + level * 5;
    isProcessing = false;
    
    levelEl.textContent = level;
    movesEl.textContent = moves;
    scoreEl.textContent = score;
    gameOverEl.style.display = 'none';
    
    initBoard();
    renderBoard();
  }
  
  function initBoard() {
    board = [];
    for (var r = 0; r < ROWS; r++) {
      board[r] = [];
      for (var c = 0; c < COLS; c++) {
        var type;
        do {
          type = Math.floor(Math.random() * GEM_TYPES.length);
        } while (hasMatch(r, c, type));
        
        board[r][c] = { type: type, color: GEM_COLORS[type], emoji: GEM_TYPES[type] };
      }
    }
  }
  
  function hasMatch(r, c, type) {
    if (c >= 2) {
      if (board[r][c - 1] && board[r][c - 1].type === type &&
          board[r][c - 2] && board[r][c - 2].type === type) {
        return true;
      }
    }
    if (r >= 2) {
      if (board[r - 1] && board[r - 1][c] && board[r - 1][c].type === type &&
          board[r - 2] && board[r - 2][c] && board[r - 2][c].type === type) {
        return true;
      }
    }
    return false;
  }
  
  function renderBoard() {
    boardEl.innerHTML = '';
    
    for (var r = 0; r < ROWS; r++) {
      for (var c = 0; c < COLS; c++) {
        var cell = document.createElement('div');
        cell.className = 'cell';
        cell.dataset.row = r;
        cell.dataset.col = c;
        
        if (board[r][c]) {
          var gem = document.createElement('div');
          gem.className = 'gem ' + board[r][c].color;
          gem.textContent = board[r][c].emoji;
          cell.appendChild(gem);
        }
        
        if (selectedCell && selectedCell.r === r && selectedCell.c === c) {
          cell.classList.add('selected');
        }
        
        cell.addEventListener('click', function() {
          onCellClick(parseInt(this.dataset.row), parseInt(this.dataset.col));
        });
        
        boardEl.appendChild(cell);
      }
    }
  }
  
  function onCellClick(r, c) {
    if (isProcessing) return;
    if (moves <= 0) return;
    
    if (!selectedCell) {
      selectedCell = { r, c };
      renderBoard();
      return;
    }
    
    if (selectedCell.r === r && selectedCell.c === c) {
      selectedCell = null;
      renderBoard();
      return;
    }
    
    var dr = Math.abs(r - selectedCell.r);
    var dc = Math.abs(c - selectedCell.c);
    
    if ((dr === 1 && dc === 0) || (dr === 0 && dc === 1)) {
      swapGems(selectedCell.r, selectedCell.c, r, c);
    } else {
      selectedCell = { r, c };
      renderBoard();
    }
  }
  
  function swapGems(r1, c1, r2, c2) {
    isProcessing = true;
    
    var temp = board[r1][c1];
    board[r1][c1] = board[r2][c2];
    board[r2][c2] = temp;
    
    renderBoard();
    
    setTimeout(function() {
      var matches = findMatches();
      
      if (matches.length > 0) {
        moves--;
        movesEl.textContent = moves;
        processMatches(matches);
      } else {
        var temp = board[r1][c1];
        board[r1][c1] = board[r2][c2];
        board[r2][c2] = temp;
        renderBoard();
        isProcessing = false;
      }
      
      selectedCell = null;
    }, 200);
  }
  
  function findMatches() {
    var matches = [];
    
    for (var r = 0; r < ROWS; r++) {
      for (var c = 0; c < COLS - 2; c++) {
        var type = board[r][c].type;
        if (board[r][c + 1].type === type && board[r][c + 2].type === type) {
          var matchLength = 3;
          while (c + matchLength < COLS && board[r][c + matchLength].type === type) {
            matchLength++;
          }
          for (var i = 0; i < matchLength; i++) {
            matches.push({ r: r, c: c + i });
          }
          c += matchLength - 1;
        }
      }
    }
    
    for (var c = 0; c < COLS; c++) {
      for (var r = 0; r < ROWS - 2; r++) {
        var type = board[r][c].type;
        if (board[r + 1][c].type === type && board[r + 2][c].type === type) {
          var matchLength = 3;
          while (r + matchLength < ROWS && board[r + matchLength][c].type === type) {
            matchLength++;
          }
          for (var i = 0; i < matchLength; i++) {
            matches.push({ r: r + i, c: c });
          }
          r += matchLength - 1;
        }
      }
    }
    
    var uniqueMatches = [];
    var seen = {};
    for (var i = 0; i < matches.length; i++) {
      var key = matches[i].r + ',' + matches[i].c;
      if (!seen[key]) {
        seen[key] = true;
        uniqueMatches.push(matches[i]);
      }
    }
    
    return uniqueMatches;
  }
  
  function processMatches(matches) {
    var matchScore = matches.length * 10 * level;
    score += matchScore;
    scoreEl.textContent = score;
    
    for (var i = 0; i < matches.length; i++) {
      var cell = boardEl.children[matches[i].r * COLS + matches[i].c];
      cell.classList.add('matching');
    }
    
    setTimeout(function() {
      for (var i = 0; i < matches.length; i++) {
        board[matches[i].r][matches[i].c] = null;
      }
      
      dropGems();
    }, 300);
  }
  
  function dropGems() {
    for (var c = 0; c < COLS; c++) {
      var emptyRows = [];
      
      for (var r = ROWS - 1; r >= 0; r--) {
        if (board[r][c] === null) {
          emptyRows.push(r);
        } else if (emptyRows.length > 0) {
          var targetRow = emptyRows.shift();
          board[targetRow][c] = board[r][c];
          board[r][c] = null;
          emptyRows.push(r);
        }
      }
      
      for (var i = 0; i < emptyRows.length; i++) {
        var type = Math.floor(Math.random() * GEM_TYPES.length);
        board[emptyRows[i]][c] = { type: type, color: GEM_COLORS[type], emoji: GEM_TYPES[type] };
      }
    }
    
    renderBoard();
    
    setTimeout(function() {
      var newMatches = findMatches();
      
      if (newMatches.length > 0) {
        processMatches(newMatches);
      } else {
        isProcessing = false;
        checkGameOver();
      }
    }, 300);
  }
  
  function checkGameOver() {
    if (moves <= 0) {
      isProcessing = true;
      winText.textContent = '😢 游戏结束！';
      finalScoreEl.textContent = score;
      gameOverEl.style.display = 'block';
    }
    
    if (score >= level * 1000) {
      isProcessing = true;
      winText.textContent = '🎉 恭喜过关！';
      finalScoreEl.textContent = score;
      gameOverEl.style.display = 'block';
    }
  }
  
  newGameBtn.addEventListener('click', function() { initGame(1); });
  restartBtn.addEventListener('click', function() { initGame(level); });
  
  initGame();
})();
</script>
</body>
</html>
