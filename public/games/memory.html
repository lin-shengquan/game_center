<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>记忆配对游戏</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
      "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  }

  body {
    background: #0f0f23;
    color: #e8e8ff;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 16px;
    overflow-x: hidden;
  }

  .game-container {
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .header {
    text-align: center;
  }

  .title {
    font-size: 24px;
    font-weight: 700;
    background: linear-gradient(135deg, #a78bfa 0%, #f472b6 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 1px;
  }

  .stats {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 12px;
    padding: 12px 16px;
  }

  .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 1;
  }

  .stat-label {
    font-size: 12px;
    color: #9ca3c8;
    margin-bottom: 4px;
    letter-spacing: 1px;
  }

  .stat-value {
    font-size: 20px;
    font-weight: 700;
    color: #e8e8ff;
    font-variant-numeric: tabular-nums;
  }

  .restart-btn {
    background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 10px 16px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    white-space: nowrap;
    font-family: inherit;
  }

  .restart-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 18px rgba(99, 102, 241, 0.35);
  }

  .restart-btn:active {
    transform: translateY(0);
  }

  .board {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    perspective: 1000px;
  }

  .card {
    aspect-ratio: 1 / 1;
    position: relative;
    cursor: pointer;
    transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(0.4, 0.0, 0.2, 1);
  }

  .card.flipped {
    transform: rotateY(180deg);
  }

  .card.matched {
    cursor: default;
  }

  .card-face {
    position: absolute;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    border-radius: 12px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    user-select: none;
  }

  .card-back {
    background: linear-gradient(135deg, #1e1e3f 0%, #2a2a5a 100%);
    border: 1px solid rgba(167, 139, 250, 0.2);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
  }

  .card-back::after {
    content: "?";
    font-size: 28px;
    font-weight: 700;
    color: rgba(167, 139, 250, 0.5);
  }

  .card-front {
    transform: rotateY(180deg);
    font-size: 32px;
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.15);
  }

  .card.matched .card-front {
    animation: matchPulse 0.5s ease;
  }

  @keyframes matchPulse {
    0% { transform: rotateY(180deg) scale(1); }
    50% { transform: rotateY(180deg) scale(1.12); }
    100% { transform: rotateY(180deg) scale(1); }
  }

  /* 8 distinct gradient colors for the 8 pairs */
  .grad-0 { background: linear-gradient(135deg, #f87171 0%, #ef4444 100%); }
  .grad-1 { background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%); }
  .grad-2 { background: linear-gradient(135deg, #34d399 0%, #10b981 100%); }
  .grad-3 { background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%); }
  .grad-4 { background: linear-gradient(135deg, #a78bfa 0%, #8b5cf6 100%); }
  .grad-5 { background: linear-gradient(135deg, #f472b6 0%, #ec4899 100%); }
  .grad-6 { background: linear-gradient(135deg, #2dd4bf 0%, #14b8a6 100%); }
  .grad-7 { background: linear-gradient(135deg, #fb923c 0%, #f97316 100%); }

  .win-overlay {
    position: fixed;
    inset: 0;
    background: rgba(15, 15, 35, 0.85);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 100;
    animation: fadeIn 0.3s ease;
  }

  .win-overlay.active {
    display: flex;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .win-card {
    background: linear-gradient(135deg, #1e1e3f 0%, #2a2a5a 100%);
    border: 1px solid rgba(167, 139, 250, 0.3);
    border-radius: 20px;
    padding: 32px 40px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    max-width: 90%;
  }

  @keyframes popIn {
    from { transform: scale(0.8); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .win-title {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 12px;
    background: linear-gradient(135deg, #fbbf24 0%, #f472b6 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .win-stats {
    font-size: 15px;
    color: #c7c7e8;
    margin-bottom: 20px;
    line-height: 1.6;
  }

  .win-stats span {
    color: #a78bfa;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }

  .win-btn {
    background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 10px 24px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: transform 0.15s ease;
  }

  .win-btn:hover {
    transform: translateY(-1px);
  }

  @media (max-width: 380px) {
    .title { font-size: 20px; }
    .stat-value { font-size: 18px; }
    .card-front { font-size: 26px; }
    .card-back::after { font-size: 24px; }
    .board { gap: 8px; }
  }
</style>
</head>
<body>
  <div class="game-container">
    <div class="header">
      <div class="title">记忆配对</div>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-label">步数</div>
        <div class="stat-value" id="moves">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">时间</div>
        <div class="stat-value" id="timer">00:00</div>
      </div>
      <button class="restart-btn" id="restartBtn">重新开始</button>
    </div>

    <div class="board" id="board"></div>
  </div>

  <div class="win-overlay" id="winOverlay">
    <div class="win-card">
      <div class="win-title">🎉 恭喜你赢了！</div>
      <div class="win-stats">
        用时 <span id="winTime">00:00</span><br>
        步数 <span id="winMoves">0</span>
      </div>
      <button class="win-btn" id="winBtn">再来一局</button>
    </div>
  </div>

<script>
(function () {
  "use strict";

  // 8 emoji symbols paired with 8 distinct gradient classes
  var SYMBOLS = [
    { emoji: "🍎", grad: "grad-0" },
    { emoji: "🌟", grad: "grad-1" },
    { emoji: "🚀", grad: "grad-2" },
    { emoji: "🎵", grad: "grad-3" },
    { emoji: "🌈", grad: "grad-4" },
    { emoji: "⚡", grad: "grad-5" },
    { emoji: "🌙", grad: "grad-6" },
    { emoji: "🔥", grad: "grad-7" }
  ];

  var boardEl = document.getElementById("board");
  var movesEl = document.getElementById("moves");
  var timerEl = document.getElementById("timer");
  var restartBtn = document.getElementById("restartBtn");
  var winOverlay = document.getElementById("winOverlay");
  var winTimeEl = document.getElementById("winTime");
  var winMovesEl = document.getElementById("winMoves");
  var winBtn = document.getElementById("winBtn");

  var cards = [];
  var flippedCards = [];
  var matchedCount = 0;
  var moves = 0;
  var seconds = 0;
  var timerInterval = null;
  var lockBoard = false;
  var gameStarted = false;

  function shuffle(arr) {
    for (var i = arr.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = arr[i];
      arr[i] = arr[j];
      arr[j] = tmp;
    }
    return arr;
  }

  function formatTime(s) {
    var m = Math.floor(s / 60);
    var sec = s % 60;
    return (m < 10 ? "0" : "") + m + ":" + (sec < 10 ? "0" : "") + sec;
  }

  function startTimer() {
    if (timerInterval) return;
    timerInterval = setInterval(function () {
      seconds++;
      timerEl.textContent = formatTime(seconds);
    }, 1000);
  }

  function stopTimer() {
    if (timerInterval) {
      clearInterval(timerInterval);
      timerInterval = null;
    }
  }

  function buildDeck() {
    var deck = [];
    for (var i = 0; i < SYMBOLS.length; i++) {
      deck.push({ id: i, emoji: SYMBOLS[i].emoji, grad: SYMBOLS[i].grad });
      deck.push({ id: i, emoji: SYMBOLS[i].emoji, grad: SYMBOLS[i].grad });
    }
    return shuffle(deck);
  }

  function renderBoard() {
    boardEl.innerHTML = "";
    cards = buildDeck();
    for (var i = 0; i < cards.length; i++) {
      var card = document.createElement("div");
      card.className = "card";
      card.dataset.index = i;
      card.dataset.id = cards[i].id;

      var back = document.createElement("div");
      back.className = "card-face card-back";

      var front = document.createElement("div");
      front.className = "card-face card-front " + cards[i].grad;
      front.textContent = cards[i].emoji;

      card.appendChild(back);
      card.appendChild(front);

      (function (cardEl, idx) {
        cardEl.addEventListener("click", function () {
          onCardClick(cardEl, idx);
        });
      })(card, i);

      boardEl.appendChild(card);
    }
  }

  function onCardClick(cardEl, idx) {
    if (lockBoard) return;
    if (cardEl.classList.contains("flipped")) return;
    if (cardEl.classList.contains("matched")) return;

    if (!gameStarted) {
      gameStarted = true;
      startTimer();
    }

    cardEl.classList.add("flipped");
    flippedCards.push({ el: cardEl, idx: idx, id: cards[idx].id });

    if (flippedCards.length === 2) {
      moves++;
      movesEl.textContent = moves;
      checkMatch();
    }
  }

  function checkMatch() {
    var a = flippedCards[0];
    var b = flippedCards[1];

    if (a.id === b.id) {
      // match
      a.el.classList.add("matched");
      b.el.classList.add("matched");
      matchedCount++;
      flippedCards = [];

      if (matchedCount === SYMBOLS.length) {
        winGame();
      }
    } else {
      // no match, flip back after delay
      lockBoard = true;
      setTimeout(function () {
        a.el.classList.remove("flipped");
        b.el.classList.remove("flipped");
        flippedCards = [];
        lockBoard = false;
      }, 850);
    }
  }

  function winGame() {
    stopTimer();
    winTimeEl.textContent = formatTime(seconds);
    winMovesEl.textContent = moves;
    setTimeout(function () {
      winOverlay.classList.add("active");
    }, 400);
  }

  function resetGame() {
    stopTimer();
    seconds = 0;
    moves = 0;
    matchedCount = 0;
    flippedCards = [];
    lockBoard = false;
    gameStarted = false;
    movesEl.textContent = "0";
    timerEl.textContent = "00:00";
    winOverlay.classList.remove("active");
    renderBoard();
  }

  restartBtn.addEventListener("click", resetGame);
  winBtn.addEventListener("click", resetGame);

  // initialize
  renderBoard();
})();
</script>
</body>
</html>
